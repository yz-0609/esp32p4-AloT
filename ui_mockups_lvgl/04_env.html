  <main class="screen">

      <div class="title">环境监测</div>
      <div class="subtitle">RS485 SENSOR / COMFORT</div>
      <div class="status">SENSOR</div>

    <section class="content">
      <div class="card accent-card" style="left:0;top:0;width:656px;height:128px;"></div>
      <div class="section-title" style="left:28px;top:26px;">综合舒适度</div>
      <div class="value" style="left:28px;top:64px;">82</div>
      <div class="label" style="left:96px;top:76px;">适合学习，建议保持当前状态</div>
      <div class="pill" style="left:548px;top:48px;width:76px;">GOOD</div>

      <div class="card" style="left:0;top:154px;width:316px;height:154px;"></div>
      <div class="label" style="left:24px;top:178px;">温度 / 湿度</div>
      <div class="value" style="left:24px;top:214px;">26.4 C</div>
      <div class="meter" style="left:24px;top:268px;width:254px;"><span style="width:58%;"></span></div>

      <div class="card" style="left:340px;top:154px;width:316px;height:154px;"></div>
      <div class="label" style="left:364px;top:178px;">光照强度</div>
      <div class="value" style="left:364px;top:214px;">320 lx</div>
      <div class="meter" style="left:364px;top:268px;width:254px;"><span style="width:66%;"></span></div>

      <div class="card" style="left:0;top:334px;width:316px;height:154px;"></div>
      <div class="label" style="left:24px;top:358px;">空气质量</div>
      <div class="value" style="left:24px;top:394px;">良好</div>
      <div class="meter" style="left:24px;top:448px;width:254px;"><span style="width:72%;"></span></div>

      <div class="card" style="left:340px;top:334px;width:316px;height:154px;"></div>
      <div class="label" style="left:364px;top:358px;">传感器状态</div>
      <div class="value" style="left:364px;top:394px;">在线</div>
      <div class="label small" style="left:364px;top:448px;width:230px;">Modbus RTU / 1s 刷新</div>
    </section>
