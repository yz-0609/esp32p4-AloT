      <div class="pill" style="left:452px;top:104px;width:78px;">LLM</div>

      <div class="value" style="left:356px;top:236px;">320</div>
      <div class="label small" style="left:430px;top:248px;">lx</div>

      <div class="card" style="left:504px;top:184px;width:152px;height:122px;"></div>
      <div class="label" style="left:524px;top:204px;">空气</div>
      <div class="value" style="left:524px;top:236px;">良</div>
      <div class="label small" style="left:524px;top:276px;">TVOC 正常</div>

      <div class="label" style="left:24px;top:404px;">照明继电器</div>

      <div class="pill" style="left:218px;top:446px;width:72px;">OFF</div>
